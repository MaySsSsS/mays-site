name: Update AI Daily

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ai-daily-update
  cancel-in-progress: false

jobs:
  update-ai-daily:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update AI Daily data
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ vars.ZHIPU_BASE_URL }}
          ZHIPU_MODEL: ${{ vars.ZHIPU_MODEL }}
        run: pnpm update:ai-daily

      - name: Commit updated AI Daily data
        id: commit-data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/ai-daily/index.json public/data/ai-daily/entries
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(data): update AI Daily"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy updated frontend to Cloudflare Workers
        if: steps.commit-data.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_AI_DAILY_PASSWORD_HASH: ${{ vars.NEXT_PUBLIC_AI_DAILY_PASSWORD_HASH }}
          NEXT_PUBLIC_GAME_API_URL: ${{ vars.NEXT_PUBLIC_GAME_API_URL }}
          NEXT_PUBLIC_PHOTO_API_URL: ${{ vars.NEXT_PUBLIC_PHOTO_API_URL }}
          SIGNAL_ARENA_API_URL: https://signal-arena-api.maysssss.cn
          STEAM_DATA_SOURCE: static
        run: pnpm run deploy
