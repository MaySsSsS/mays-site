name: Update Steam Data

on:
  # 每天 UTC 时间 2:00 运行（北京时间 10:00）
  schedule:
    - cron: "0 2 * * *"
  # 支持手动触发
  workflow_dispatch:

concurrency:
  group: steam-data-update
  cancel-in-progress: false

jobs:
  # 更新Steam数据
  update-steam-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Steam data and upload to Worker
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
          GAME_UPLOAD_SECRET: ${{ secrets.GAME_UPLOAD_SECRET }}
        run: node scripts/fetch-steam-data.js

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/steam-games.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): update Steam games snapshot"
          git push || echo "No changes to push"

  # 说明：
  # - 这个 workflow 只负责 Steam 数据同步，不负责前端部署。
  # - 前端已经改为根目录的单一 Next.js 应用。
  # - 当前代码包含 middleware 子域名路由，按 Cloudflare 当前文档更适合通过
  #   Workers + OpenNext / Workers Builds 部署，而不是 Pages 静态导出。
