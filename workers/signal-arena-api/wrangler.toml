name = "mays-signal-arena-api"
main = "src/index.ts"
compatibility_date = "2026-05-22"
routes = [
  { pattern = "signal-arena-api.maysssss.cn", custom_domain = true }
]

[[d1_databases]]
binding = "SIGNAL_ARENA_DB"
database_name = "signal-arena"
database_id = "bc073b2d-b36c-4590-b14a-627f4ed70358"

[[kv_namespaces]]
binding = "SIGNAL_ARENA_KV"
id = "e1b7f7c61df542eaa4c7ea82bbe14545"

[triggers]
crons = [
  "35,50 1 * * 1-5",
  "5,20,35,50 2,5,6 * * 1-5",
  "5,20 3 * * 1-5"
]

[vars]
CORS_ORIGIN = "https://maysssss.cn"
SIGNAL_ARENA_BASE_URL = "https://signal.coze.com"
SIGNAL_ARENA_ACCOUNT_SCOPE = "quant-v1"
SIGNAL_ARENA_STRATEGY_VERSION = "Q-Alpha v1"
SIGNAL_ARENA_AI_PROVIDER = "custom-responses"
SIGNAL_ARENA_AI_BASE_URL = "https://sub2.de5.net"
SIGNAL_ARENA_AI_STRICT_MODEL = "gpt-5.4"
SIGNAL_ARENA_AI_STRICT_REASONING_EFFORT = "high"
SIGNAL_ARENA_AI_LIGHT_MODEL = "gpt-5.4"
SIGNAL_ARENA_AI_LIGHT_REASONING_EFFORT = "low"
SIGNAL_ARENA_AI_DISABLE_RESPONSE_STORAGE = "true"
